<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Bookmarks</title>

    <style>
      body {
        margin: 0;
        background: radial-gradient(circle at 50% 20%, #0f1f2f, #000);
        color: white;
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }

      .header {
        text-align: center;
        padding: 16px 0;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #a8eaff;
        text-shadow: 0 0 8px #00eaff;
      }

      .container {
        padding: 12px;
        height: 380px;
        overflow-y: auto;
      }

      .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background-image:
          radial-gradient(2px 2px at 20% 30%, #66eaff55, transparent),
          radial-gradient(2px 2px at 80% 70%, #66eaff55, transparent),
          radial-gradient(2px 2px at 50% 90%, #66eaff55, transparent),
          radial-gradient(1px 1px at 10% 80%, #66eaff55, transparent),
          radial-gradient(1px 1px at 90% 20%, #66eaff55, transparent);
      }
    </style>
  </head>

  <body>
    <div class="stars"></div>

    <div class="header">Bubble Bookmarks</div>

    <div id="root" class="container"></div>

    <!-- ここはルート基準で /src/popup.jsx を指す -->
    <script type="module" src="/src/popup.jsx"></script>
  </body>
</html>
